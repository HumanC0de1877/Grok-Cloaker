name = "cloaker-hub"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ⚠️  NUNCA coloque variáveis sensíveis aqui.
# Configure DATABASE_URL, JWT_SECRET e NEXTAUTH_SECRET
# exclusivamente no painel do Cloudflare Pages:
# https://dash.cloudflare.com → Pages → cloaker-hub → Settings → Environment variables

[vars]
NODE_ENV = "production"
